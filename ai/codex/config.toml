# https://developers.openai.com/codex/config-sample

model = "gpt-5.4"
model_reasoning_effort = "medium"
personality = "pragmatic"
network_access = true
web_search = 'cached' # OpenAI-maintained cache
notify = ["ai-notify"]
suppress_unstable_features_warning = true
check_for_update_on_startup = false

model_instructions_file = "../SYSTEM.md"
# developer_instructions = ""

sandbox_mode = "workspace-write"

[agents]
max_threads = 4
max_depth = 1

[sandbox_workspace_write]
network_access=true

[features]
unified_exec = true
apply_patch_freeform = true
skills = true
shell_snapshot = true
js_repl = true
use_linux_sandbox_bwrap = true
# multi_agent = true

[tui]
notifications = false
status_line = ["model-with-reasoning", "context-remaining"]


[shell_environment_policy]
inherit = "none"
include_only = ["PATH", "HOME", "ACCEL_OS"]


[projects."/home/isymchych/accel-os"]
trust_level = "trusted"

[projects."/home/isymchych/work/PAB"]
trust_level = "trusted"

[projects."/home/isymchych/projects"]
trust_level = "trusted"

[mcp_servers.serena]
command = "uvx"
args = ["--from", "git+https://github.com/oraios/serena", "serena", "start-mcp-server", "--context", "codex"]
enabled = false

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest", "--executable-path", "/usr/bin/chromium", "--extension"]
enabled = false

[mcp_servers.playwright.env]
PLAYWRIGHT_MCP_EXTENSION_TOKEN = "4ABNUUw41dr10RtRCTxvNUGoNsadvCq-PvdIfuKa77I"

# autoConnect requires setup https://github.com/ChromeDevTools/chrome-devtools-mcp#connecting-to-a-running-chrome-instance
[mcp_servers.chrome-devtools]
command = "npx"
args = [
   "chrome-devtools-mcp@latest",
  # "-e", "/usr/bin/chromium",

  # "--autoConnect",
  "--browserUrl", "http://127.0.0.1:9222",
  "--wsEndpoint", "ws://127.0.0.1:9222/devtools/browser",

  "--no-performance-crux",
  "--no-usage-statistics",

  "--no-category-emulation",
  "--no-category-performance",
  "--slim",
]
enabled = false

[notice]
hide_rate_limit_model_nudge = true

[analytics]
enabled = false

[feedback]
enabled = false
